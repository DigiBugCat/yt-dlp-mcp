services:
  app:
    image: ghcr.io/${GITHUB_OWNER:-example}/yt-dlp-mcp:latest
    build:
      context: .
      args:
        YTDLP_CHANNEL: ${YTDLP_CHANNEL:-nightly}
    restart: unless-stopped
    depends_on:
      - parakeet
    labels:
      - "com.centurylinklabs.watchtower.scope=yt-dlp-mcp"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MCP_PATH=/mcp
      - HEALTH_PATH=/healthz
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-5}
      - DATA_DIR=/data
      - DATABASE_PATH=/data/yt_dlp_mcp.sqlite3
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - PARAKEET_URL=http://parakeet:8000
    volumes:
      - yt-dlp-data:/data
    expose:
      - "3000"

  parakeet:
    build:
      context: ../parakeet
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HUGGINGFACE_ACCESS_TOKEN=${HUGGINGFACE_TOKEN}
      - ENABLE_DIARIZATION=true
      - INCLUDE_DIARIZATION_IN_TEXT=false
      - MODEL_ID=nvidia/parakeet-tdt-0.6b-v3
    volumes:
      - parakeet-cache:/root/.cache
    expose:
      - "8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: yt-dlp-mcp-cloudflared
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}

  watchtower:
    image: containrrr/watchtower:latest
    container_name: yt-dlp-mcp-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_SCOPE=yt-dlp-mcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.scope=yt-dlp-mcp"

volumes:
  yt-dlp-data:
  parakeet-cache:
